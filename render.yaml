services:
  - type: web
    name: reliableops-backend
    env: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: reliableops-db
          property: connectionString
      - key: POSTGRES_DB
        fromDatabase:
          name: reliableops-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: reliableops-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: reliableops-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: reliableops-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: reliableops-db
          property: port

databases:
  - name: reliableops-db
    databaseName: reliableops
    user: reliableops
    plan: free
