version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: reliableops
      POSTGRES_USER: reliableops
      POSTGRES_PASSWORD: reliableops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reliableops"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ops_net

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: /app/entrypoint.sh
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_DB=reliableops
      - POSTGRES_USER=reliableops
      - POSTGRES_PASSWORD=reliableops
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - DJANGO_DEBUG=True
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,backend
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ops_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    networks:
      - ops_net

volumes:
  postgres_data:

networks:
  ops_net:
    driver: bridge
